<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Inventory</title>
  <link rel="stylesheet" href="contoh.css">
</head>
<body>

<header>
  <h2>Mini Inventory Lab</h2>
</header>

<div class="filters">
  <button onclick="setFilter('all')">Semua</button>
  <button onclick="setFilter('PC')">PC</button>
  <button onclick="setFilter('Laptop')">Laptop</button>
</div>

<div class="center">
  <button onclick="toggleForm()">+ Tambah</button>
</div>

<form id="form">
  <input id="name" placeholder="Nama perangkat" required>
  <input id="img" placeholder="URL gambar" required>

  <select id="cat">
    <option value="PC">PC</option>
    <option value="Laptop">Laptop</option>
  </select>

  <select id="status">
    <option value="Baik">Baik</option>
    <option value="Rusak">Rusak</option>
  </select>

  <button type="submit">Simpan</button>
</form>

<div id="grid" class="grid"></div>

<script src="contoh.js"></script>
</body>
</html>
